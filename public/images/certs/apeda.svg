<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" width="280" height="160">
  <rect width="280" height="160" fill="white"/>
  <!-- APEDA leaf/plant logo mark -->
  <g transform="translate(72, 20)">
    <!-- central stem -->
    <line x1="28" y1="105" x2="28" y2="50" stroke="#2E7D32" stroke-width="3" stroke-linecap="round"/>
    <!-- left large leaf -->
    <path d="M28 75 C10 65 2 45 14 30 C22 50 28 60 28 75Z" fill="#4CAF50"/>
    <!-- right large leaf -->
    <path d="M28 75 C46 65 54 45 42 30 C34 50 28 60 28 75Z" fill="#388E3C"/>
    <!-- top leaf -->
    <path d="M28 55 C20 40 22 20 28 12 C34 20 36 40 28 55Z" fill="#66BB6A"/>
    <!-- small left branch -->
    <path d="M28 85 C14 80 8 68 16 58 C20 68 25 76 28 85Z" fill="#4CAF50"/>
    <!-- small right branch -->
    <path d="M28 85 C42 80 48 68 40 58 C36 68 31 76 28 85Z" fill="#388E3C"/>
  </g>
  <!-- APEDA text (Hindi) -->
  <text x="148" y="72" font-family="Arial, sans-serif" font-size="14" fill="#2E7D32" text-anchor="start" font-weight="500">एपीडा</text>
  <!-- APEDA text (English) -->
  <text x="148" y="94" font-family="Arial, sans-serif" font-size="22" fill="#2E7D32" text-anchor="start" font-weight="bold" letter-spacing="1">APEDA</text>
  <!-- subtitle -->
  <text x="140" y="135" font-family="Arial, sans-serif" font-size="8.5" fill="#555555" text-anchor="middle">Agricultural &amp; Processed Food Products</text>
  <text x="140" y="149" font-family="Arial, sans-serif" font-size="8.5" fill="#555555" text-anchor="middle">Export Development Authority</text>
</svg>
